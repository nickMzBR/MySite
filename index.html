<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Robux 2026</title>
    <style>
        :root {
            --bg-color: #1a1e24;
            --text-color: #ffffff;
            --text-muted: #8b92a5;
            --accent-green: #4ade80;
            --accent-green-hover: #22c55e;
            --accent-blue: #7dd3fc;
            --accent-blue-hover: #38bdf8;
            --modal-bg: #2d3342;
            --input-bg: #1f2937;
            --input-border: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            transition: filter 0.3s ease;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .highlight {
            color: var(--accent-green);
        }

        p {
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #claim-btn {
            background-color: var(--accent-green);
            color: #000;
        }

        #claim-btn:hover {
            background-color: var(--accent-green-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background-color: var(--modal-bg);
            padding: 3rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            line-height: 1.3;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="email"]::placeholder {
            color: var(--text-muted);
        }

        input[type="email"]:focus {
            border-color: var(--accent-blue);
        }

        .submit-btn {
            background-color: var(--accent-blue);
            color: #000;
            border-radius: 8px;
            width: 100%;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: var(--accent-blue-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(125, 211, 252, 0.3);
        }

        .close-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .close-link:hover {
            color: var(--text-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container" id="main-content">
        <h1>Click here for <br><span class="highlight">Free </span></h1>
        <p>Click here for free robux 100% safe, no virus</p>
        <button id="claim-btn" class="btn">Claim here</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2>Enter Your Email To<br>Claim Free Robux</h2>
            <form id="troll-form">
                <input type="email" id="email-input" placeholder="Enter your email" required>
                <button type="submit" class="btn submit-btn">CLAIM MY OFFER</button>
            </form>
            <a href="#" id="close-modal" class="close-link">No, I don't want bonus</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const claimBtn = document.getElementById('claim-btn');
            const modal = document.getElementById('modal');
            const mainContent = document.getElementById('main-content');
            const closeModal = document.getElementById('close-modal');
            const trollForm = document.getElementById('troll-form');

            // Open modal
            claimBtn.addEventListener('click', () => {
                modal.classList.add('active');
                mainContent.style.filter = 'blur(4px)';
            });

            // Close modal (optional, but good for UX even on a troll site)
            closeModal.addEventListener('click', (e) => {
                e.preventDefault();
                modal.classList.remove('active');
                mainContent.style.filter = 'none';
            });

            // Form submit -> Rick Roll
            trollForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // You could theoretically grab the email here, but for a simple troll we just redirect
                // const email = document.getElementById('email-input').value;
                
                // Redirect to Rick Roll
                window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            });
        });
    </script>
</body>
</html>
