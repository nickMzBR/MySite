<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mostrar Texto</title>
</head>
<body>

    <!-- Botão que aciona a função -->
    <button onclick="mostrarTexto()">Clique Aqui</button>

    <!-- Espaço onde o texto vai aparecer -->
    <p id="mensagem"></p>

    <script>
        function mostrarTexto() {
            // Modifica o conteúdo do parágrafo ao clicar
            document.getElementById("mensagem").textContent = "Olá! O texto apareceu.";
        }
    </script>

</body>
</html>
